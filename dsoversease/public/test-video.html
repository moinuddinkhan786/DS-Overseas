<!DOCTYPE html>
<html>
<head>
    <title>Video Test</title>
    <style>
        body {
            background: #0a0f1e;
            padding: 20px;
        }
        .video-container {
            width: 280px;
            height: 500px;
            background: #0d1b40;
            margin: 20px;
            display: inline-block;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <h1 style="color: white;">Video Test - Check if videos work</h1>

    <div class="video-container">
        <video controls muted loop playsinline>
            <source src="/videos/hiren-makwana.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-container">
        <video controls muted loop playsinline>
            <source src="/videos/success-story-2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-container">
        <video controls muted loop playsinline autoplay>
            <source src="/videos/chetan.mp4" type="video/mp4">
        </video>
    </div>
</body>
</html>
